<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Primary -->
    <title>Sintax IA | Agentes de IA para Automação Empresarial</title>
    <meta name="description" content="Automatize sua operação com Agentes de IA personalizados. Atendimento 24/7, SDR inteligente e orquestração de workflows. Diagnóstico gratuito para sua empresa." />
    <meta name="author" content="Sintax IA" />
    <meta name="keywords" content="automação com IA, agentes de inteligência artificial, chatbot whatsapp empresa, automação de vendas, SDR inteligente, automação operacional" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sintaxia.app" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sintaxia.app" />
    <meta property="og:title" content="Sintax IA | Agentes de IA para Automação Empresarial" />
    <meta property="og:description" content="Projetamos Agentes de IA que eliminam gargalos operacionais e transformam processos lentos em fluxos autônomos. Diagnóstico gratuito." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Sintax IA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sintax IA | Agentes de IA para Automação Empresarial" />
    <meta name="twitter:description" content="Projetamos Agentes de IA que eliminam gargalos operacionais e transformam processos lentos em fluxos autônomos." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sintax IA",
      "url": "https://sintaxia.app",
      "description": "Consultoria Estratégica de Inteligência Artificial. Agentes de IA personalizados para automação empresarial.",
      "founder": {
        "@type": "Person",
        "name": "Mateus Passos",
        "jobTitle": "Founder & Director of Strategy"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+55-71-98243-5004",
        "contactType": "sales",
        "availableLanguage": "Portuguese"
      },
      "sameAs": [
        "https://www.linkedin.com/company/sintaxia",
        "https://www.instagram.com/sintaxia"
      ]
    }
    </script>

    <!-- Structured Data - Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Automação com Inteligência Artificial",
      "provider": {
        "@type": "Organization",
        "name": "Sintax IA"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços de IA",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Atendimento Cognitivo",
              "description": "Suporte inteligente via WhatsApp e Web com IA 24/7"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Orquestração de Workflows",
              "description": "Automação total entre ERP, CRM e sistemas empresariais"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SDR Inteligente",
              "description": "Prospecção e qualificação automática de leads em escala"
            }
          }
        ]
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
